  <text x="114" y="176" fill="#171717" font-size="28" font-family="Inter, sans-serif" font-weight="600">5D image data</text>
  <text x="114" y="214" fill="#6B6B6B" font-size="20" font-family="Inter, sans-serif">Store and visualize large scientific image collections.</text>
  <text x="492" y="176" fill="#171717" font-size="28" font-family="Inter, sans-serif" font-weight="600">Flexible metadata</text>
  <text x="492" y="214" fill="#6B6B6B" font-size="20" font-family="Inter, sans-serif">Annotations and resource context stay attached to data.</text>
  <text x="872" y="176" fill="#171717" font-size="28" font-family="Inter, sans-serif" font-weight="600">Open modules</text>
  <text x="872" y="214" fill="#6B6B6B" font-size="20" font-family="Inter, sans-serif">Extend workflows in Python, MATLAB, or Java plus ImageJ.</text>
  <text x="114" y="70" fill="#171717" font-size="22" font-family="Inter, sans-serif" font-weight="600">BisQue Ultra</text>
  <text x="114" y="430" fill="#F5F5F5" font-size="54" font-family="Inter, sans-serif" font-weight="700">Platform foundation</text>
  <text x="114" y="474" fill="#A1A1AA" font-size="24" font-family="Inter, sans-serif">BisQue Ultra builds on BisQue's storage, metadata, annotation, and analysis infrastructure.</text>
  <text x="114" y="514" fill="#A1A1AA" font-size="24" font-family="JetBrains Mono, monospace">storage + visualization + modules + provenance</text>
</svg>
