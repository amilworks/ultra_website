<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" rx="34" fill="#F7F7F5"/>
  <rect x="34" y="34" width="1132" height="562" rx="28" fill="#FCFCFB" stroke="#E4E4E1"/>
  <rect x="76" y="116" width="288" height="182" rx="26" fill="#FDFDFC" stroke="#E5E5E2"/>
  <rect x="456" y="116" width="288" height="182" rx="26" fill="#FDFDFC" stroke="#E5E5E2"/>
  <rect x="836" y="116" width="288" height="182" rx="26" fill="#FDFDFC" stroke="#E5E5E2"/>
