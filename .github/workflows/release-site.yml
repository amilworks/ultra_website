name: Release Site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-site.yml"
      - "shared/brand/**"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install site dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Build site
        run: pnpm build
        working-directory: site
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL != '' && vars.PUBLIC_SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH != '' && vars.SITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
